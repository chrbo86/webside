<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Morgenbrief</title>
<style>
  body { font-family: Georgia, serif; background: #f5f5f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
  .card { background: #fff; max-width: 500px; padding: 48px 40px; text-align: center; border-radius: 4px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
  h1 { color: #1a2e4a; font-size: 28px; margin-bottom: 12px; }
  p { color: #555; font-size: 16px; line-height: 1.6; }
  .badge { display: inline-block; background: #1a2e4a; color: #fff; padding: 6px 16px; border-radius: 20px; font-size: 13px; margin-top: 24px; font-family: Arial, sans-serif; }
</style>
</head>
<body>
<div class="card">
  <h1>☕ Morgenbrief</h1>
  <p>Siden er klar! Den første utgaven publiseres automatisk i morgen tidlig klokken 06:00.</p>
  <p style="margin-top:12px">Du kan også kjøre GitHub Action manuelt for å generere en brief nå.</p>
  <span class="badge">Setter opp …</span>
</div>
</body>
</html>
